# =============================================================================
# HTTPRoutes — path-based routing for all 12 globeco microservices
# =============================================================================
# Each route maps a path prefix to the corresponding ClusterIP Service.
# The Gateway fans traffic out based on the URL path.
#
# Path design:
#   /allocations    → globeco-allocation-service:8089
#   /confirmations  → globeco-confirmation-service:80
#   /executions     → globeco-execution-service:8084
#   /fix-engine     → globeco-fix-engine-service:80
#   /order-gen      → globeco-order-generation-service:8088
#   /orders         → globeco-order-service:8081
#   /accounting     → globeco-portfolio-accounting-service:8087
#   /               → globeco-portfolio-management-portal:3000  (default/catch-all)
#   /portfolios     → globeco-portfolio-service:8000
#   /pricing        → globeco-pricing-service:8083
#   /securities     → globeco-security-service:8000
#   /trades         → globeco-trade-service:8082
# =============================================================================

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: allocation-route
  namespace: globeco
spec:
  parentRefs:
    - name: globeco-gateway
      namespace: globeco
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /allocations
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: globeco-allocation-service
          port: 8089

