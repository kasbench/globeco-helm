apiVersion: apps/v1
kind: Deployment
metadata:
  name: globeco-fix-engine
  namespace: globeco
  labels:
    app: globeco-fix-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: globeco-fix-engine
  template:
    metadata:
      labels:
        app: globeco-fix-engine
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z globeco-execution-service-kafka 9092; do echo "Waiting for Kafka..."; sleep 2; done']
      containers:
        - name: globeco-fix-engine
          image: kasbench/globeco-fix-engine:1.0.8
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          env:
            # Inject the node and pod metadata from the Downward API
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: MY_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Inject the node IP from the Downward API
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP

            # Point OTEL exporter to the local collector on the same node
            
            - name: OTEL_METRICENDPOINT
              value: "$(NODE_IP):4317"

            - name: OTEL_TRACEENDPOINT
              value: "$(NODE_IP):4317"

            # Define standard service identity attributes
            - name: OTEL_SERVICE_NAME
              value: "globeco-fix-engine"  # Fixed to match actual service name
            - name: OTEL_SERVICE_NAMESPACE
              value: "globeco"
            
            # Log level configuration
            - name: LOG_LEVEL
              value: "info"
            
            # Inject Kubernetes metadata as resource attributes for k8sattributes processor
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: >-
                k8s.pod.ip=$(MY_POD_IP),
                k8s.pod.name=$(MY_POD_NAME),
                k8s.node.name=$(MY_NODE_NAME),
                k8s.namespace.name=$(MY_NAMESPACE)

          resources:
            requests:
              cpu: 200m
              memory: 100Mi
            limits:
              cpu: 200m
              memory: 100Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8085
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8085
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
