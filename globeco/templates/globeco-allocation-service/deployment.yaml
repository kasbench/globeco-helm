apiVersion: apps/v1
kind: Deployment
metadata:
  name: globeco-allocation-service
  namespace: globeco
  labels:
    app: globeco-allocation-service
    environment: aws
spec:
  replicas: 1
  selector:
    matchLabels:
      app: globeco-allocation-service
  template:
    metadata:
      labels:
        app: globeco-allocation-service
    spec:
      containers:
      - name: globeco-allocation-service
        image: kasbench/globeco-allocation-service-server:1.0.2
        imagePullPolicy: IfNotPresent 
        ports:
        - containerPort: 8089
          name: http
        envFrom:
        - configMapRef:
            name: allocation-service-config-aws
        env:
        # Inject the node and pod metadata from the Downward API
          - name: MY_POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: MY_POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: MY_NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: MY_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          # Inject the node IP from the Downward API
          - name: NODE_IP
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          
          - name: OBSERVABILITY_OTEL_ENDPOINT
            value: "$(NODE_IP):4317"

          # Define standard service identity attributes
          - name: OTEL_SERVICE_NAME
            value: "globeco-allocation-service"  # Changed to match container name
          - name: OTEL_SERVICE_NAMESPACE
            value: "globeco"
          
          # Inject Kubernetes metadata as resource attributes for k8sattributes processor
          - name: OTEL_RESOURCE_ATTRIBUTES
            value: >-
              k8s.pod.ip=$(MY_POD_IP),
              k8s.pod.name=$(MY_POD_NAME),
              k8s.node.name=$(MY_NODE_NAME),
              k8s.namespace.name=$(MY_NAMESPACE)
        volumeMounts:
        - name: data
          mountPath: /data
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          # initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          # initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 6
        startupProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 12
        resources:
          requests:
            memory: "100Mi"
            cpu: "200m"
          limits:
            memory: "100Mi"
            cpu: "200m"
        # volumeMounts:
        # - name: tmp-files
        #   mountPath: /tmp/files
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: allocation-service-data
      - name: tmp
        emptyDir:
          sizeLimit: 1Gi
      
      
