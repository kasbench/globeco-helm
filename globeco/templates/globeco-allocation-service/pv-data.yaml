apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Release.Name }}-efs-pv
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain 
  storageClassName: efs-static-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: {{ .Values.executionDataFs | quote }}